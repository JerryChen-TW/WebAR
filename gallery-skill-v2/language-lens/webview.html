<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Language Lens AR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  overflow: hidden;
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  width: 100vw;
  height: 100vh;
}

#wrap {
  position: relative;
  width: 100%;
  height: 100%;
}

#video {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}

/* All AR overlays are drawn here */
#overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

/* Header bar */
#header {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
  padding: 10px 12px 8px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
  display: flex;
  align-items: center;
  gap: 8px;
}

#lang-chip {
  background: #1a73e8;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 12px;
  letter-spacing: 0.3px;
}

#status-text {
  color: rgba(255,255,255,0.8);
  font-size: 12px;
}

/* Loading screen */
#loading {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.88);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  z-index: 20;
}

.ring {
  width: 44px; height: 44px;
  border: 3px solid rgba(255,255,255,0.15);
  border-top-color: #1a73e8;
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

#load-msg {
  color: rgba(255,255,255,0.75);
  font-size: 14px;
}

/* Error screen */
#err {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  gap: 12px;
  z-index: 20;
}
#err-msg {
  color: #f28b82;
  font-size: 13px;
  text-align: center;
  line-height: 1.5;
}
</style>
</head>
<body>
<div id="wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>

  <div id="header">
    <span id="lang-chip">Loading…</span>
    <span id="status-text">Starting…</span>
  </div>

  <div id="loading">
    <div class="ring"></div>
    <div id="load-msg">Loading vision model…</div>
  </div>

  <div id="err">
    <div id="err-msg"></div>
  </div>
</div>

<script type="module">
// ─── Read URL params ───────────────────────────────────────────────────────
const sp = new URLSearchParams(location.search);
const LANG = sp.get('lang') || 'ja';
const LANG_NAME = sp.get('langName') || 'Japanese';

document.getElementById('lang-chip').textContent = LANG_NAME;

// ─── Translation dictionary ────────────────────────────────────────────────
// [native word, romanization ('' if Latin), english label]
const DICT = {
  ja: {
    person:['人','hito'], bicycle:['自転車','jitensha'], car:['車','kuruma'],
    motorcycle:['バイク','baiku'], airplane:['飛行機','hikōki'], bus:['バス','basu'],
    train:['電車','densha'], truck:['トラック','torakku'], boat:['ボート','bōto'],
    bird:['鳥','tori'], cat:['猫','neko'], dog:['犬','inu'], horse:['馬','uma'],
    cow:['牛','ushi'], sheep:['羊','hitsuji'], elephant:['象','zō'], bear:['熊','kuma'],
    zebra:['シマウマ','shimauma'], giraffe:['キリン','kirin'],
    backpack:['リュック','ryukku'], umbrella:['傘','kasa'],
    handbag:['ハンドバッグ','handobaggu'], suitcase:['スーツケース','sūtsukēsu'],
    bottle:['瓶','bin'], 'wine glass':['ワイングラス','waingurasu'],
    cup:['コップ','koppu'], fork:['フォーク','fōku'], knife:['ナイフ','naifu'],
    spoon:['スプーン','supūn'], bowl:['お椀','owan'], banana:['バナナ','banana'],
    apple:['りんご','ringo'], sandwich:['サンドイッチ','sandoicchi'],
    orange:['オレンジ','orenji'], broccoli:['ブロッコリー','burokkorī'],
    carrot:['にんじん','ninjin'], 'hot dog':['ホットドッグ','hottodoggu'],
    pizza:['ピザ','piza'], donut:['ドーナツ','dōnatsu'], cake:['ケーキ','kēki'],
    chair:['椅子','isu'], couch:['ソファ','sofa'], bed:['ベッド','beddo'],
    toilet:['トイレ','toire'], tv:['テレビ','terebi'], laptop:['ノートPC','nōto PC'],
    mouse:['マウス','mausu'], remote:['リモコン','rimokon'],
    keyboard:['キーボード','kībōdo'], 'cell phone':['スマホ','sumaho'],
    microwave:['電子レンジ','denshi renji'], oven:['オーブン','ōbun'],
    sink:['シンク','shinku'], refrigerator:['冷蔵庫','reizōko'],
    book:['本','hon'], clock:['時計','tokei'], vase:['花瓶','kabin'],
    scissors:['ハサミ','hasami'], toothbrush:['歯ブラシ','haburashi'],
    'potted plant':['植木','ueki'], 'dining table':['食卓','shokutaku'],
    'sports ball':['ボール','bōru'], kite:['凧','tako'],
    'traffic light':['信号機','shingōki'], bench:['ベンチ','benchi'],
    'fire hydrant':['消火栓','shōkasen'], 'stop sign':['一時停止','ichiji teishi'],
    tie:['ネクタイ','nekutai'], 'teddy bear':['テディベア','tediibea'],
    'hair drier':['ドライヤー','doraiyā'], skateboard:['スケボー','sukebō'],
    surfboard:['サーフボード','sāfubōdo'], 'tennis racket':['ラケット','raketto'],
  },
  // 其餘語言映射略，與 assets/webview.html 原內容一致...
};

function translate(label) {
  const tbl = DICT[LANG] || DICT['ja'];
  return tbl[label.toLowerCase()] || null;
}

// ─── DOM ──────────────────────────────────────────────────────────────────
const video    = document.getElementById('video');
const canvas   = document.getElementById('overlay');
const ctx      = canvas.getContext('2d');
const loading  = document.getElementById('loading');
const loadMsg  = document.getElementById('load-msg');
const statusEl = document.getElementById('status-text');
const errDiv   = document.getElementById('err');
const errMsg   = document.getElementById('err-msg');

function showError(msg) {
  loading.style.display = 'none';
  errDiv.style.display = 'flex';
  errMsg.textContent = msg;
}

// ─── MediaPipe (same bundle the official text-spinner skill uses) ──────────
import {
  ObjectDetector,
  FilesetResolver
} from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs';

let detector = null;
let lastTime = -1;

async function initDetector() {
  loadMsg.textContent = 'Loading object detection model…';
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm'
  );
  detector = await ObjectDetector.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        'https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite',
      delegate: 'CPU',
    },
    scoreThreshold: 0.42,
    runningMode: 'VIDEO',
    maxResults: 5,
  });
}

// 其餘 AR loop / drawing / boot 程式碼與原本 assets/webview.html 完全一致...
</script>
</body>
</html>
