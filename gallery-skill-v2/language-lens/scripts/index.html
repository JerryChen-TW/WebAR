<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Language Lens Skill</title>
  </head>
  <body>
    <script>
      // JS entry point for the Language Lens skill.
      // Runs in a hidden webview as described in the AI Edge Gallery skills README.
      // It parses the language settings and asks the host app to open webview.html
      // with appropriate query parameters.
      window['ai_edge_gallery_get_result'] = async (dataStr, _secret) => {
        try {
          let lang = 'en';
          let langName = 'English';

          if (dataStr) {
            const obj = JSON.parse(typeof dataStr === 'string' ? dataStr : String(dataStr));
            if (obj && obj.language) lang = String(obj.language);
            if (obj && obj.languageName) langName = String(obj.languageName);
          }

          const url =
            'webview.html?lang=' +
            encodeURIComponent(lang) +
            '&langName=' +
            encodeURIComponent(langName);

          return JSON.stringify({
            result: 'Starting Language Lens AR view for ' + langName + ' (' + lang + ').',
            webview: {
              url,
              aspectRatio: 1.0,
            },
          });
        } catch (e) {
          const msg = e && e.message ? e.message : String(e);
          console.error('language-lens skill error', e);
          return JSON.stringify({ error: 'language-lens skill error: ' + msg });
        }
      };
    </script>
  </body>
</html>
