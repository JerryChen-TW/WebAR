<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Language Lens</title>
  </head>
  <body>
    <script>
      window['ai_edge_gallery_get_result'] = async (data) => {
        const jsonObj = JSON.parse(data);
        const lang = jsonObj.language || 'en';
        const langName = jsonObj.languageName || 'English';
        return JSON.stringify({
          webview: {
            url: `webview.html?lang=${encodeURIComponent(lang)}&langName=${encodeURIComponent(langName)}`
          }
        });
      };
    </script>
  </body>
</html>
