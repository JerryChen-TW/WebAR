<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Language Lens Skill</title>
  </head>
  <body>
    <script>
      /**
       * AI Edge Gallery JS skill entry point.
       * Called by the Gallery Android runtime with a stringified JSON payload.
       * Must return a stringified JSON object.
       *
       * Official structure reference:
       *   skills/built-in/text-spinner/scripts/index.html (google-ai-edge/gallery)
       *   → webview.html lives in assets/, script returns url: "assets/webview.html?..."
       *
       * Key fix: webview.html MUST be inside assets/ and the url MUST include the
       * assets/ prefix so the Gallery host can resolve the local file correctly.
       */
      window['ai_edge_gallery_get_result'] = async (dataStr, _secret) => {
        try {
          console.log('[language-lens] skill invoked, raw data:', dataStr);

          let lang     = 'en';
          let langName = 'English';

          if (dataStr) {
            const obj = JSON.parse(typeof dataStr === 'string' ? dataStr : String(dataStr));
            if (obj && obj.language)     lang     = String(obj.language);
            if (obj && obj.languageName) langName = String(obj.languageName);
          }

          console.log('[language-lens] parsed: lang=' + lang + ' langName=' + langName);

          // Cache-bust with timestamp so the webview always reloads fresh,
          // matching the pattern used by virtual-piano (google-ai-edge/gallery).
          const url =
            'assets/webview.html' +
            '?lang='     + encodeURIComponent(lang) +
            '&langName=' + encodeURIComponent(langName) +
            '&v='        + Date.now();

          console.log('[language-lens] returning webview url:', url);

          return JSON.stringify({
            webview: {
              url,
              aspectRatio: 0.75,
            },
          });
        } catch (e) {
          const msg = e && e.message ? e.message : String(e);
          console.error('[language-lens] error:', e);
          return JSON.stringify({ error: 'language-lens skill error: ' + msg });
        }
      };
    </script>
  </body>
</html>
