<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Language Lens Skill</title>
  </head>
  <body>
    <script>
      /**
       * AI Edge Gallery JS skill entry point.
       *
       * ROOT CAUSE FIX (2026-06-08):
       *   App's getJsSkillWebviewUrl() (SkillManagerViewModel.kt) always
       *   prepends "/assets/" to whatever url this function returns:
       *
       *     return "$baseUrl/assets/$url"
       *
       *   So this script must return ONLY the filename ("webview.html"),
       *   NOT the full relative path ("assets/webview.html").
       *   Returning "assets/webview.html" caused the App to build:
       *     .../assets/assets/webview.html  ← 404, webview blank, skill fails
       *
       *   Reference: google-ai-edge/gallery
       *     skills/built-in/text-spinner/scripts/index.html
       *     → url: `webview.html?label=${jsonObj.label}`  (no assets/ prefix)
       */
      window['ai_edge_gallery_get_result'] = async (dataStr, _secret) => {
        try {
          console.log('[language-lens] skill invoked, raw data:', dataStr);

          let lang     = 'en';
          let langName = 'English';

          if (dataStr) {
            const obj = JSON.parse(typeof dataStr === 'string' ? dataStr : String(dataStr));
            if (obj && obj.language)     lang     = String(obj.language);
            if (obj && obj.languageName) langName = String(obj.languageName);
          }

          console.log('[language-lens] parsed: lang=' + lang + ' langName=' + langName);

          // CORRECT: return plain filename only.
          // App will resolve full path as: {baseUrl}/assets/webview.html?...
          const url =
            'webview.html' +
            '?lang='     + encodeURIComponent(lang) +
            '&langName=' + encodeURIComponent(langName);

          console.log('[language-lens] returning webview url:', url);

          return JSON.stringify({
            result: 'Opening Language Lens AR view in ' + langName + '.',
            webview: {
              url,
              aspectRatio: 0.75,
            },
          });
        } catch (e) {
          const msg = e && e.message ? e.message : String(e);
          console.error('[language-lens] error:', e);
          return JSON.stringify({ error: 'language-lens skill error: ' + msg });
        }
      };
    </script>
  </body>
</html>
