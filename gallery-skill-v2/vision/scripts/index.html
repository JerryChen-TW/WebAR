<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>Vision Skill Entry</title>
</head>
<body>
<script>
  // Gallery 入口：不顯示畫面，直接回傳 webview URL
  window['ai_edge_gallery_get_result'] = async function(data) {
    let params = {};
    try { params = JSON.parse(data); } catch(e) {}
    const facingMode = params.facingMode || 'environment';
    return JSON.stringify({
      result: '請在下方 AR 畫面中查看即時物件偵測結果',
      webview: {
        url: 'scripts/ar.html?facingMode=' + facingMode,
        aspectRatio: 1.333
      }
    });
  };
</script>
</body>
</html>
