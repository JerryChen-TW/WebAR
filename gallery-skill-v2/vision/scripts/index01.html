<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>物件偵測器</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 20px;
            background: #1a1a2e; color: #fff;
        }
        .container { max-width: 500px; margin: 0 auto; }
        
        #cameraVideo {
            width: 100%;
            border-radius: 12px;
            background: #000;
            display: none;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            margin-top: 16px;
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .btn:disabled { background: #666; opacity: 0.5; }
        
        .result-box {
            margin-top: 20px;
            padding: 16px;
            background: #16213e;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center;">🔍 MediaPipe 物件偵測器</h2>
        
        <video id="cameraVideo" playsinline autoplay muted></video>
        
        <button id="detectBtn" class="btn">📷 開始偵測</button>
        
        <div class="result-box" id="resultBox"></div>
    </div>

    <script type="module">
        let objectDetector = null;
        let currentStream = null;
        const videoElement = document.getElementById('cameraVideo');
        const detectBtn = document.getElementById('detectBtn');
        const resultBox = document.getElementById('resultBox');

        async function initModel() {
            try {
                const { ObjectDetector, FilesetResolver } = await import(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"
                );
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                objectDetector = await ObjectDetector.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/int8/1/efficientdet_lite0.tflite",
                        delegate: "GPU"
                    },
                    scoreThreshold: 0.5,
                    runningMode: "IMAGE"
                });
                return true;
            } catch (error) {
                throw error;
            }
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            videoElement.srcObject = null;
            videoElement.style.display = 'none';
        }

        async function performDetection() {
            detectBtn.disabled = true;
            detectBtn.textContent = '⏳ 辨識中...';
            try {
                if (!objectDetector) await initModel();
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                currentStream = stream;
                videoElement.srcObject = stream;
                videoElement.style.display = 'block';
                await new Promise(resolve => {
                    if (videoElement.readyState >= 1) resolve();
                    else videoElement.onplay = resolve;
                });
                const detections = objectDetector.detect(videoElement);
                const filteredDetections = detections.detections.filter(d => 
                    d.categories.length > 0 && d.categories[0].score >= 0.5
                );
                if (filteredDetections.length > 0) {
                    const labels = filteredDetections.map(d => 
                        `${d.categories[0].categoryName} (${Math.round(d.categories[0].score * 100)}%)`
                    ).join(', ');
                    resultBox.style.display = 'block';
                    resultBox.innerHTML = `<strong>✅ 偵測到：</strong><br>${labels}`;
                    setTimeout(() => {
                        stopCamera();
                        window['ai_edge_gallery_get_result'](JSON.stringify({
                            result: `我偵測到畫面有：${labels}`,
                            detections: filteredDetections.map(d => ({
                                categoryName: d.categories[0].categoryName,
                                score: parseFloat(d.categories[0].score.toFixed(2)),
                                boundingBox: {
                                    xMin: parseFloat(d.boundingBox.xMin.toFixed(3)),
                                    yMin: parseFloat(d.boundingBox.yMin.toFixed(3)),
                                    xMax: parseFloat(d.boundingBox.xMax.toFixed(3)),
                                    yMax: parseFloat(d.boundingBox.yMax.toFixed(3))
                                }
                            }))
                        }));
                    }, 2000);
                } else {
                    resultBox.style.display = 'block';
                    resultBox.innerHTML = '<strong>❌</strong> 未偵測到明顯物件';
                    setTimeout(() => {
                        stopCamera();
                        window['ai_edge_gallery_get_result'](JSON.stringify({ result: "畫面中沒有明顯的物件。" }));
                    }, 2000);
                }
            } catch (error) {
                resultBox.style.display = 'block';
                let errorMsg = `❌ 辨識失敗：${error.message}`;
                if (error.name === 'NotAllowedError') {
                    errorMsg = "❌ 無法存取相機<br><small>請在設定中允許相機權限</small>";
                }
                resultBox.innerHTML = errorMsg;
                setTimeout(() => {
                    stopCamera();
                    window['ai_edge_gallery_get_result'](JSON.stringify({ error: errorMsg }));
                }, 2000);
            }
            detectBtn.disabled = false;
            detectBtn.textContent = '📷 開始偵測';
        }

        // Entry point called by Gallery
        window['ai_edge_gallery_get_result'] = async (data) => {
            const params = JSON.parse(data);
            initModel().catch(err => console.warn('預載失敗:', err));
            return JSON.stringify({
                result: "請在下方介面點擊「開始偵測」按鈕",
                webview: {
                    url: "scripts/index.html?facingMode=" + (params.facingMode || "environment"),
                    aspectRatio: 1.333
                }
            });
        };

        detectBtn.addEventListener('click', performDetection);
        initModel().catch(err => console.warn('預載模型失敗:', err));
    </script>
</body>
</html>
