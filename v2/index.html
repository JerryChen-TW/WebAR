<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>AR Language Learner v2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="topbar">
      <span id="app-title">AR Lens <sup style="font-size:10px;opacity:.6">v2</sup></span>
      <div id="lang-selector">
        <button id="lang-btn"><span class="lang-label">English</span></button>
        <div id="lang-menu"></div>
      </div>
    </div>

    <div id="count-badge"></div>
    <div id="status" class="hidden"></div>

    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-text">Starting camera…</div>
    </div>

    <div id="cam-error">
      <h2>Camera Access Needed</h2>
      <p>Please allow camera access to use AR object detection.</p>
      <button id="retry-btn">Try Again</button>
    </div>
  </div>

  <script src="labels.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
