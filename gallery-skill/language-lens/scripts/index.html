<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
window.ai_edge_gallery_get_result = async function(data) {
  try {
    const params = JSON.parse(data);
    const lang = params.language || 'ja';
    const langName = params.languageName || 'Japanese';
    return JSON.stringify({
      result: `Opening camera for ${langName} learning mode...`,
      webview: {
        url: `../assets/webview.html?lang=${encodeURIComponent(lang)}&langName=${encodeURIComponent(langName)}`,
        aspectRatio: 1.78
      }
    });
  } catch (e) {
    return JSON.stringify({ error: 'Failed to parse parameters: ' + e.message });
  }
};
</script>
</body>
</html>
