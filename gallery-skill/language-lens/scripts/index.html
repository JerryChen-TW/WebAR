<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Lens</title>
  </head>
  <body>
    <script>
      window['ai_edge_gallery_get_result'] = async (data) => {
        let lang = 'en';
        let langName = 'English';
        try {
          const obj = JSON.parse(data);
          if (obj && obj.language) lang = String(obj.language);
          if (obj && obj.languageName) langName = String(obj.languageName);
        } catch (e) {}
        return JSON.stringify({
          webview: {
            url: `webview.html?lang=${encodeURIComponent(lang)}&langName=${encodeURIComponent(langName)}`
          }
        });
      };
    </script>
  </body>
</html>
