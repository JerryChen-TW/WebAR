<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Language Lens Bridge</title>
</head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async function(data) {
  // Robustly parse data — may be null, undefined, empty string, or valid JSON
  var params = {};
  try {
    if (data && data !== 'null' && data !== 'undefined') {
      var parsed = JSON.parse(data);
      if (parsed && typeof parsed === 'object') {
        params = parsed;
      }
    }
  } catch (e) { /* use empty params, rely on defaults below */ }

  var lang     = (params.language     || 'en').toString();
  var langName = (params.languageName || 'English').toString();

  var url = 'assets/webview.html?lang='
    + encodeURIComponent(lang)
    + '&langName='
    + encodeURIComponent(langName);

  return JSON.stringify({
    result: 'AR camera opened for ' + langName + '. Point at any object to see its name!',
    webview: {
      url: url,
      aspectRatio: 0.75
    }
  });
};
</script>
</body>
</html>
