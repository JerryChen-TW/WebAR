<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Language Lens</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: -apple-system, sans-serif; }

  #camera-container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  #header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
  }
  #lang-badge {
    background: #4285f4;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  #status {
    color: rgba(255,255,255,0.8);
    font-size: 13px;
  }

  #loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 20;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: #4285f4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-text { color: #fff; font-size: 15px; opacity: 0.8; }

  .label-bubble {
    position: absolute;
    background: rgba(0,0,0,0.75);
    border: 2px solid #4285f4;
    border-radius: 10px;
    padding: 6px 10px;
    pointer-events: none;
    transform: translate(-50%, -110%);
    white-space: nowrap;
  }
  .label-native {
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    display: block;
    line-height: 1.2;
  }
  .label-roman {
    color: #adf;
    font-size: 11px;
    display: block;
  }
  .label-en {
    color: rgba(255,255,255,0.5);
    font-size: 10px;
    display: block;
  }
  .detect-box {
    position: absolute;
    border: 2px solid #4285f4;
    border-radius: 4px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="camera-container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="header">
    <span id="lang-badge">Loading...</span>
    <span id="status">Initialising...</span>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">Loading vision model...</div>
  </div>
</div>

// ─── URL params ───────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const LANG = params.get('lang') || 'ja';
const LANG_NAME = params.get('langName') || 'Japanese';
const translations = DICT[LANG] || DICT['ja'];

function translate(label) {
  const key = label.toLowerCase();
  return translations[key] || [label, '', label];
}

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const loadingOverlay = document.getElementById('loading-overlay');
const loadingText = document.getElementById('loading-text');
const langBadge = document.getElementById('lang-badge');
const statusEl = document.getElementById('status');

langBadge.textContent = LANG_NAME;

// ─── Detection boxes (DOM overlay, no canvas drawing needed for labels) ───────
const container = document.getElementById('camera-container');
const activeBoxes = [];
function clearBoxes() {
  activeBoxes.forEach(el => el.remove());
  activeBoxes.length = 0;
}
function drawDetections(detections) {
  clearBoxes();
  const W = container.offsetWidth;
  const H = container.offsetHeight;
  detections.forEach(det => {
    const [native, roman, en] = translate(det.categoryName);
    const score = Math.round(det.score * 100);
    if (score < 40) return;

    const bb = det.boundingBox;
    const x = bb.originX * W;
    const y = bb.originY * H;
    const w = bb.width * W;
    const h = bb.height * H;

    // box
    const box = document.createElement('div');
    box.className = 'detect-box';
    box.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;`;
    container.appendChild(box);
    activeBoxes.push(box);

    // label bubble above box
    const bubble = document.createElement('div');
    bubble.className = 'label-bubble';
    bubble.style.cssText = `left:${x + w/2}px;top:${y}px;`;
    bubble.innerHTML = `
      <span class="label-native">${native}</span>
      ${roman ? `<span class="label-roman">${roman}</span>` : ''}
      <span class="label-en">${en} · ${score}%</span>
    `;
    container.appendChild(bubble);
    activeBoxes.push(bubble);
  });
}

// ─── MediaPipe Object Detector ────────────────────────────────────────────────
import { ObjectDetector, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm';

let detector = null;
let lastVideoTime = -1;
let animId = null;

async function initDetector() {
  loadingText.textContent = 'Loading vision model…';
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm'
  );
  detector = await ObjectDetector.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite',
      delegate: 'GPU'
    },
    scoreThreshold: 0.4,
    runningMode: 'VIDEO',
    maxResults: 5,
  });
  loadingText.textContent = 'Starting camera…';
}

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
  });
  video.srcObject = stream;
  await new Promise(r => video.addEventListener('loadeddata', r, { once: true }));
}

function detect() {
  if (video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    try {
      const result = detector.detectForVideo(video, performance.now());
      drawDetections(result.detections);
      const count = result.detections.filter(d => d.score >= 0.4).length;
      statusEl.textContent = count > 0 ? `${count} object${count > 1 ? 's' : ''} detected` : 'Scanning…';
    } catch(e) {
      // skip frame on error
    }
  }
  animId = requestAnimationFrame(detect);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  try {
    await initDetector();
    await startCamera();
    loadingOverlay.style.display = 'none';
    statusEl.textContent = 'Scanning…';
    detect();
  } catch (e) {
    loadingText.textContent = '⚠️ ' + e.message;
    console.error(e);
  }
}

boot();
</script>
